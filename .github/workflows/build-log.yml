name: build-log

# OpenPaw build-in-public feed. Copy this file into EVERY public source repo.
#
# On every push to main and every published release it:
#   1. Posts a factual build-log message to Discord  (DISCORD_WEBHOOK_URL)
#   2. Posts the same to Telegram                     (TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID)
#   3. If the commit message contains "[post]" (or it's a release), fires a
#      repository_dispatch to openpaw-marketing so the X devlog DRAFT pipeline
#      runs. X never auto-posts — drafts wait for your approval.
#
# Required repo secrets (set with `gh secret set <NAME> --repo <owner>/<repo>`):
#   DISCORD_WEBHOOK_URL        (channel A)
#   TELEGRAM_BOT_TOKEN         (channel A, optional)
#   TELEGRAM_CHAT_ID           (channel A, optional)
#   MARKETING_DISPATCH_TOKEN   (channel B — a PAT with `repo` scope that can
#                               dispatch to aeropriest/openpaw-marketing)
# Any missing secret is skipped gracefully.

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build-log:
    runs-on: ubuntu-latest
    steps:
      - name: Compose message
        id: msg
        env:
          REPO: ${{ github.event.repository.name }}
          ACTOR: ${{ github.actor }}
          EVENT: ${{ github.event_name }}
          MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          TAG: ${{ github.event.release.tag_name }}
          REL_URL: ${{ github.event.release.html_url }}
        run: |
          if [ "$EVENT" = "release" ]; then
            CONTENT="🚀 **$REPO** released **$TAG**"$'\n'"$REL_URL"
          else
            CONTENT="🐾 **$REPO** — $MSG"$'\n'"by \`$ACTOR\` • $COMMIT_URL"
          fi
          # stash for later steps (multiline-safe)
          {
            echo "content<<__EOF__"
            echo "$CONTENT"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Discord
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CONTENT: ${{ steps.msg.outputs.content }}
        run: |
          curl -sS -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "$CONTENT" '{content:$c}')" \
            "$DISCORD_WEBHOOK_URL"

      - name: Telegram
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CONTENT: ${{ steps.msg.outputs.content }}
        run: |
          # Telegram uses Markdown (single *), strip Discord's ** to be safe.
          TEXT="$(printf '%s' "$CONTENT" | sed 's/\*\*/*/g')"
          curl -sS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=false" >/dev/null

  # Channel B — only when the commit opts in with [post], or on a release.
  x-draft:
    runs-on: ubuntu-latest
    needs: build-log
    if: >-
      github.event_name == 'release' ||
      contains(github.event.head_commit.message, '[post]')
    steps:
      - name: Trigger X draft pipeline in openpaw-marketing
        if: ${{ env.MARKETING_DISPATCH_TOKEN != '' }}
        env:
          MARKETING_DISPATCH_TOKEN: ${{ secrets.MARKETING_DISPATCH_TOKEN }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MARKETING_DISPATCH_TOKEN }}
          repository: aeropriest/openpaw-marketing
          event-type: devlog
          client-payload: |
            {
              "repo": "${{ github.event.repository.name }}",
              "sha": "${{ github.sha }}",
              "message": ${{ toJSON(github.event.head_commit.message) }},
              "tag": "${{ github.event.release.tag_name }}",
              "event": "${{ github.event_name }}",
              "compare_url": "${{ github.event.compare }}"
            }
